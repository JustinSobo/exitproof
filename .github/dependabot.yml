# Optional supply-chain hygiene for GridLogic ExitProof (Phase 6).
# Opens PRs for npm and GitHub Actions dependency updates.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      day: monday
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
